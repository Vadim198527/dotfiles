
# Отключить управление потоком терминала (C-s и C-q)
# run-shell "stty -ixon"
unbind r
bind r source-file ~/.tmux.conf
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g base-index 1
set -g prefix M-j
set -g mouse on
unbind-key -n C-Enter
set -g terminal-overrides '*:kend=\E[F:kenter=\E[M'
bind-key h select-pane -L
set -s extended-keys on
set -as terminal-features 'extkeys'
set -s extended-keys-format csi-u
setw -g mode-keys vi
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
set-option -g status-position top
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'catppuccin/tmux#latest'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tpm' # mandatory
set -g @plugin 'tmux-plugins/tmux-sensible' # optional recommended
set -g @plugin 'egel/tmux-gruvbox'
# set desired theme options...
set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-right-status-x '%d.%m.%Y' # e.g.: 30.01.2024
set -g @tmux-gruvbox-right-status-y '%H:%M'
set -g @tmux-gruvbox-right-status-z '󰀵 '    # Apple logo
# set -g @tmux-gruvbox-left-status-a '#S' # tmux's session name
# set -g @tmux-gruvbox-right-status-x '%m/%d/%Y' # e.g.: 01/31/2024
# set -g @tmux-gruvbox-right-status-x '%d.%m.%Y' # e.g.: 30.01.2024
# set -g @tmux-gruvbox-right-status-y '%I:%M %p' # 09:54 PM
# set -g @tmux-gruvbox-right-status-z '#h #{tmux_mode_indicator}'

